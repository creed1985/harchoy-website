<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI','PingFang SC',sans-serif;background:#f9f9f9}

/* Main site nav */
.site-nav{
  display:flex;align-items:center;justify-content:space-between;
  background:#fff;padding:0 40px;height:72px;
  border-bottom:1px solid #eee;
  position:sticky;top:0;z-index:1000;
  box-shadow:0 1px 6px rgba(0,0,0,0.04);
}
.site-nav .site-logo{font-size:22px;font-weight:700;letter-spacing:2px;color:#1a1a1a}
.site-nav .site-links{display:flex;gap:28px;align-items:center}
.site-nav .site-links a{
  color:#555;text-decoration:none;font-size:13px;font-weight:500;
  transition:color .2s;padding:4px 0;border-bottom:2px solid transparent;
}
.site-nav .site-links a:hover{color:#1a1a1a}

/* Order button - highlighted */
.order-cta{
  background:#1a1a1a !important;color:#fff !important;
  padding:10px 22px !important;border-radius:6px !important;
  font-weight:600 !important;font-size:13px !important;
  border-bottom:none !important;
  transition:all .2s !important;
  display:inline-flex;align-items:center;gap:6px;
}
.order-cta:hover{
  background:#333 !important;color:#fff !important;
}

/* Hero */
.hero{
  background:linear-gradient(135deg,#1a1a1a 0%,#2d2d2d 60%,#3a3a3a 100%);
  color:#fff;text-align:center;padding:60px 20px 50px;
}
.hero h1{font-size:32px;font-weight:300;letter-spacing:3px;margin-bottom:12px}
.hero .sub{font-size:14px;color:#aaa;font-weight:300}

/* Iframe container */
.iframe-wrap{
  max-width:1400px;margin:0 auto;padding:0;
  border-left:1px solid #eee;border-right:1px solid #eee;
  background:#fff;min-height:80vh;
}
.iframe-wrap iframe{
  width:100%;height:85vh;border:none;
}

/* Footer */
.site-footer{
  background:#1a1a1a;color:#888;text-align:center;
  padding:30px;font-size:12px;
}
.site-footer a{color:#bbb;text-decoration:none}
.site-footer a:hover{color:#fff}

/* Responsive banner */
.banner{
  background:#fef9e7;color:#b45309;text-align:center;
  padding:8px;font-size:12px;
}
.banner a{color:#b45309;font-weight:600}

/* badge */
.badge-new{
  background:#ef4444;color:#fff;font-size:9px;
  padding:2px 6px;border-radius:10px;margin-left:4px;
  position:relative;top:-6px;
}
</style>
